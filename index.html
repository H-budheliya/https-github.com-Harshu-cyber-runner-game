<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Runner Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game-container">

    <h1 class="mb-3">🚀 Cyber Runner Pro</h1>

    <div class="score-box">
        <span>Score: <span id="score">0</span></span>
        <span>High Score: <span id="highScore">0</span></span>
    </div>

    <div id="gameArea">
        <div id="player">🚀</div>
    </div>

    <div class="mt-3">
        <button class="btn btn-info control-btn" onclick="startGame()">
            Start Game
        </button>

        <button class="btn btn-danger control-btn" onclick="restartGame()">
            Restart
        </button>
    </div>

    <div class="mobile-controls">
        <button class="btn btn-primary" onclick="moveLeft()">⬅</button>

        <button class="btn btn-success" onclick="moveRight()">➡</button>
    </div>

    <p class="footer">
        Use Keyboard Arrow Keys or Mobile Buttons
    </p>

</div>
<script src="script.js"></script>

</body>
</html>
